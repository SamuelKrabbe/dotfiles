monitor.alsa.rules = [
  {
    matches = [
      { device.name = "alsa_card.usb-XiiSound_Technology_Corporation_H510-PRO*" }
    ]
    actions = {
      update-props = {
        device.priority.session = 2000
      }
    }
  },

  {
    matches = [
      { device.name = "alsa_card.pci-0000*" }
    ]
    actions = {
      update-props = {
        device.priority.session = 1000
      }
    }
  }
]

[colors]
base     = #1e1e2e
surface0 = #313244
overlay0 = #6c7086
text     = #cdd6f4
subtext  = #a6adc8
blue     = #89b4fa
mauve    = #cba6f7
red      = #f38ba8
green    = #a6e3a1

[bar/main]
width            = 60%
offset-x         = 20%
offset-y         = 12
radius           = 8
height           = 32
fixed-center     = true
bottom           = false

background = ${colors.base}
foreground = ${colors.text}

font-0 = JetBrains Mono:size=10;3
font-1 = JetBrainsMono Nerd Font:size=12;3

padding-left  = 2
padding-right = 2
module-margin = 1

modules-left   = i3
modules-center = date
modules-right  = volume battery

separator = " "

[module/i3]
type            = internal/i3
format          = <label-state>
index-sort      = true
wrapping-scroll = false

label-focused            = %index%
label-focused-foreground = ${colors.blue}
label-focused-padding    = 2

label-unfocused            = %index%
label-unfocused-foreground = ${colors.overlay0}
label-unfocused-padding    = 2

label-urgent            = %index%
label-urgent-foreground = ${colors.red}
label-urgent-padding    = 2

[module/date]
type     = internal/date
interval = 1
date     = %a %d %b
time     = %H:%M
format-foreground = ${colors.subtext}
label    = %date%  %time%

[module/volume]
type             = internal/pulseaudio
format-volume    = <label-volume>
label-volume     =  %percentage%%
label-volume-foreground = ${colors.text}
label-muted      = 婢 muted
label-muted-foreground = ${colors.overlay0}

[module/battery]
type              = internal/battery
battery           = BAT0
adapter           = AC
full-at           = 99
format-charging   = <label-charging>
format-discharging = <label-discharging>
label-charging    =  %percentage%%
label-discharging =  %percentage%%
label-full-foreground = ${colors.green}
